# Local development — full stack in one command:
#   docker compose up -d
# Backend (8000) and frontend (3000) run in dev mode with hot reload from
# the bind-mounted source. First boot installs dependencies (takes a few minutes).

name: opensandbox-dashboard-dev

networks:
  opensandbox-sandbox:
    name: opensandbox-sandbox
    driver: bridge

services:
  vscode-image-pull:
    image: ${VSCODE_IMAGE:-sandbox-registry.cn-zhangjiakou.cr.aliyuncs.com/opensandbox/vscode:latest}
    entrypoint: ["echo", "VS Code base image ready"]
    pull_policy: always
    restart: "no"

  opensandbox:
    depends_on:
      vscode-image-pull:
        condition: service_completed_successfully
    image: python:3.12-slim
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./deploy/opensandbox-entrypoint.sh:/entrypoint.sh:ro
    environment:
      OPENSANDBOX_INSECURE_SERVER: "YES"
      OPENSANDBOX_SESSION_EIP: ${OPENSANDBOX_SESSION_HOST:-localhost}
      OPENSANDBOX_DOCKER_NETWORK: bridge
      OPENSANDBOX_EGRESS_ENABLED: "1"
    networks:
      - opensandbox-sandbox
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opensandbox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    command: sh -c "uv sync && uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Shadow the host's Windows .venv with a container-native one
      - backend_venv:/app/.venv
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/opensandbox
      REDIS_URL: redis://redis:6379
      OPENSANDBOX_URL: http://opensandbox:8080
      # Browser-facing host for session URLs
      OPENSANDBOX_SESSION_HOST: localhost
      # How THIS container reaches sandbox ports published on the host
      OPENSANDBOX_INTERNAL_HOST: host.docker.internal
      SANDBOX_ANTHROPIC_BASE_URL: http://host.docker.internal:8000/api/llmgw
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      # Bind mounts on Windows need polling for --reload to notice changes
      WATCHFILES_FORCE_POLLING: "true"
      UV_LINK_MODE: copy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensandbox:
        condition: service_started
    networks:
      - default
      - opensandbox-sandbox
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      # Shadow host node_modules/.next (Windows binaries) with container-native ones
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_venv:
  frontend_node_modules:
  frontend_next:
