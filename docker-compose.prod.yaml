# Production stack — run on a single EC2 host with Docker.
# Usage: cp .env.production.example .env.production && docker compose -f docker-compose.prod.yaml --env-file .env.production up -d --build

name: opensandbox-dashboard

networks:
  opensandbox-sandbox:
    name: opensandbox-sandbox
    driver: bridge

  app:
    driver: bridge

services:
  vscode-image-pull:
    image: ${VSCODE_IMAGE}
    entrypoint: ["echo", "VS Code base image ready"]
    pull_policy: always
    restart: "no"

  opensandbox:
    image: python:3.12-slim
    depends_on:
      vscode-image-pull:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./deploy/opensandbox-entrypoint.sh:/entrypoint.sh:ro
    environment:
      OPENSANDBOX_INSECURE_SERVER: "YES"
      OPENSANDBOX_SESSION_EIP: ${OPENSANDBOX_SESSION_EIP}
      OPENSANDBOX_DOCKER_NETWORK: ${OPENSANDBOX_DOCKER_NETWORK:-bridge}
      OPENSANDBOX_EGRESS_ENABLED: ${OPENSANDBOX_EGRESS_ENABLED:-0}
      OPENSANDBOX_EGRESS_IMAGE: ${OPENSANDBOX_EGRESS_IMAGE:-sandbox-registry.cn-zhangjiakou.cr.aliyuncs.com/opensandbox/egress:latest}
      OPENSANDBOX_EGRESS_MODE: ${OPENSANDBOX_EGRESS_MODE:-dns+nft}
    networks:
      - opensandbox-sandbox
      - app
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.production
    volumes:
      - ./deploy:/deploy:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensandbox:
        condition: service_started
    networks:
      - app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    depends_on:
      - backend
    networks:
      - app
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
